<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriPulse | Advanced Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- FUTURISTIC DESIGN SYSTEM --- */
        :root {
            --bg-base: #070B14;
            --panel-bg: rgba(16, 24, 39, 0.65);
            --neon-green: #00FF66;
            --neon-blue: #00E5FF;
            --neon-red: #FF0055;
            --text-main: #FFFFFF;
            --text-muted: #8B9BB4;
            --border-glow: rgba(0, 255, 102, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 102, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 260px;
            background: rgba(11, 17, 32, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            z-index: 10;
        }

        .brand {
            padding: 0 2rem 2rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1rem;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 i { color: var(--neon-green); }

        .brand-subtitle {
            color: var(--neon-blue);
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 1.2rem 2rem;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 3px solid transparent;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .nav-btn.active {
            color: var(--neon-green);
            background: linear-gradient(90deg, rgba(0, 255, 102, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            padding: 2.5rem;
            position: relative;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .section-header h2 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- DASHBOARD SENSORS (TAB 1) --- */
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.1);
            transform: translateY(-2px);
        }

        /* Decorative glowing line top of cards */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            opacity: 0.5;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .card-value {
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .card-value .unit {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-left: 5px;
        }

        /* --- LOCATION MAP (TAB 2) --- */
        .map-container {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #0b101a; /* Dark loading state */
        }

        .gps-overlay-data {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-left: 3px solid var(--neon-blue);
            z-index: 1000;
            border-radius: 4px;
        }

        /* --- IRRIGATION CONTROL (TAB 3) --- */
        .control-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }

        .pump-ring {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 2rem;
            transition: all 0.5s ease;
        }

        .pump-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, var(--text-muted), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            transition: all 0.5s ease;
        }

        .pump-ring.active::before {
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .pump-btn {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);

	position: relative; 
        z-index: 10;
        }

        .pump-btn i { font-size: 3rem; color: var(--text-muted); transition: color 0.3s; }

        .pump-btn:hover { background: rgba(255, 255, 255, 0.05); }

        /* Pump Active State */
        .pump-btn.active {
            border-color: var(--neon-green);
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.2), inset 0 0 20px rgba(0, 255, 102, 0.2);
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        .pump-btn.active i { color: var(--neon-green); }

        /* System Status indicator */
        .sys-status {
            position: absolute;
            top: 2.5rem;
            right: 2.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--neon-green);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <h1><i class="fa-solid fa-seedling"></i> AgriPulse</h1>
            <div class="brand-subtitle">Project E2G05 Server</div>
        </div>
        
        <button class="nav-btn active" onclick="switchTab('dashboard', this)">
            <i class="fa-solid fa-chart-line"></i> Telemetry
        </button>
        <button class="nav-btn" onclick="switchTab('location', this)">
            <i class="fa-solid fa-satellite-dish"></i> GPS Tracking
        </button>
        <button class="nav-btn" onclick="switchTab('irrigation', this)">
            <i class="fa-solid fa-faucet-drip"></i> Irrigation
        </button>
    </nav>

    <main class="main-content">
        <div class="sys-status">
            <div class="dot"></div>
            SYSTEM ONLINE
        </div>

        <section id="tab-dashboard" class="tab-content active">
            <div class="section-header">
                <h2>Live Telemetry</h2>
            </div>
            
            <div class="sensor-grid">
                <div class="glass-card">
                    <div class="card-header"><i class="fa-solid fa-temperature-half"></i> Core Temp</div>
                    <div class="card-value" id="temp-val">--<span class="unit">°C</span></div>
                </div>

                <div class="glass-card">
                    <div class="card-header"><i class="fa-solid fa-droplet"></i> Air Humidity</div>
                    <div class="card-value" id="hum-val">--<span class="unit">%</span></div>
                </div>

                <div class="glass-card">
                    <div class="card-header"><i class="fa-solid fa-leaf"></i> Soil Moisture</div>
                    <div class="card-value" id="soil-val">--<span class="unit">%</span></div>
                </div>
            </div>
        </section>

        <section id="tab-location" class="tab-content">
            <div class="section-header">
                <h2 style="color: var(--neon-blue);">Geospatial Tracking</h2>
            </div>
            
            <div class="map-container">
                <div id="map"></div>
                <div class="gps-overlay-data" id="gps-coords">
                    Awaiting satellite lock...
                </div>
            </div>
        </section>

        <section id="tab-irrigation" class="tab-content">
            <div class="section-header">
                <h2 style="color: var(--neon-green);">Manual Override</h2>
            </div>
            
            <div class="control-center">
                <div class="pump-ring" id="pump-ring">
                    <button class="pump-btn" id="pump-btn">
                        <i class="fa-solid fa-power-off"></i>
                        <span>SYSTEM IDLE</span>
                    </button>
                </div>
                <p style="color: var(--text-muted); letter-spacing: 1px;">WARNING: Ensure physical valves are clear before overriding.</p>
            </div>
        </section>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        // 1. IMPORT FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // 🚨 PASTE YOUR FIREBASE URL BELOW 🚨
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://smart-agriculture-system-e2g05-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 2. TAB SWITCHING LOGIC
        window.switchTab = function(tabId, btnElement) {
            // Hide all tabs & remove active class from buttons
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab & highlight button
            document.getElementById('tab-' + tabId).classList.add('active');
            btnElement.classList.add('active');

            // CRITICAL: Leaflet maps glitch if loaded in a hidden div. 
            // We must force the map to recalculate its size when the location tab is clicked.
            if(tabId === 'location') {
                setTimeout(() => { map.invalidateSize(); }, 100);
            }
        };

        // 3. INITIALIZE LEAFLET MAP
        // Default coordinates (e.g., UTM Johor Bahru area as a placeholder)
        const defaultLat = 1.558; 
        const defaultLng = 103.638;
        
        const map = L.map('map').setView([defaultLat, defaultLng], 15);
        
        // Add futuristic dark map tiles (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        // Add a marker
        let hardwareMarker = L.marker([defaultLat, defaultLng]).addTo(map);
        hardwareMarker.bindPopup("<b>AgriPulse E2G05</b><br>Last known location.").openPopup();


        // 4. FIREBASE SENSOR READINGS
        const tempDisplay = document.getElementById('temp-val');
        const humDisplay = document.getElementById('hum-val');
        const soilDisplay = document.getElementById('soil-val');
        const gpsCoords = document.getElementById('gps-coords');

        const sensorsRef = ref(db, 'agripulse/sensors');
        
        onValue(sensorsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Update Dashboard Text
                if(data.temperature !== undefined) tempDisplay.innerHTML = `${data.temperature}<span class="unit">°C</span>`;
                if(data.humidity !== undefined) humDisplay.innerHTML = `${data.humidity}<span class="unit">%</span>`;
                if(data.soilMoisture !== undefined) soilDisplay.innerHTML = `${data.soilMoisture}<span class="unit">%</span>`;
                
                // Update Map if GPS data exists and is valid
                if (data.latitude && data.longitude && data.latitude !== 0) {
                    const lat = parseFloat(data.latitude);
                    const lng = parseFloat(data.longitude);
                    
                    // Move the map and marker
                    map.setView([lat, lng], 17);
                    hardwareMarker.setLatLng([lat, lng]);
                    
                    // Update overlay text
                    gpsCoords.innerHTML = `LAT: <span style="color:var(--neon-blue)">${lat.toFixed(6)}</span><br>LNG: <span style="color:var(--neon-blue)">${lng.toFixed(6)}</span>`;
                }
            }
        });


        // 5. FIREBASE PUMP CONTROL
        const pumpBtn = document.getElementById('pump-btn');
        const pumpRing = document.getElementById('pump-ring');
        let currentPumpStatus = false;

        const pumpRef = ref(db, 'agripulse/controls/pumpStatus');
        
        onValue(pumpRef, (snapshot) => {
            currentPumpStatus = snapshot.val() || false;
            
            if (currentPumpStatus) {
                pumpBtn.classList.add("active");
                pumpRing.classList.add("active");
                pumpBtn.querySelector('span').innerText = "PUMP ENGAGED";
            } else {
                pumpBtn.classList.remove("active");
                pumpRing.classList.remove("active");
                pumpBtn.querySelector('span').innerText = "SYSTEM IDLE";
            }
        });

        pumpBtn.addEventListener('click', () => {
            set(pumpRef, !currentPumpStatus);
        });

    </script>
</body>
</html>
